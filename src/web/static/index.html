<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商智能客服</title>
    <script src="/static/marked.min.js"></script>
    <script src="/static/purify.min.js"></script>
    <style>
        /* 保留原有所有样式，无需修改 */
        :root {
            --border-radius: 16px;
            --primary-color: #3b82f6;
            --background-color: #f8f7f6;
            --shadow-color: #00000056;
            --input-box-bg-color: #ffffffcb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Consolas", "微软雅黑", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--background-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        #dialog-area {
            flex: 1;
            width: 100%;
            max-width: 900px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .message-bubble {
            display: inline-flex;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
        }

        .new-message {
            animation: messageAppear 0.3s ease;
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        .user-message {
            background-color: var(--primary-color);
            align-self: flex-end;
            color: white;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .bot-message {
            align-self: flex-start;
            color: black;
        }

        .input-box {
            width: 100%;
            max-width: 900px;
            padding: 16px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 8px var(--shadow-color);
            position: sticky;
            bottom: 16px;
            transition: all 0.3s ease;
            background-color: var(--input-box-bg-color);
            border: 2px solid transparent;
        }

        .input-box:hover {
            box-shadow: 0 4px 8px var(--primary-color);
        }

        .input-box:focus-within {
            border: 2px solid var(--primary-color);
        }

        #user-input {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            max-height: 200px;
            overflow-y: auto;
            resize: none;
            border: none;
            outline: none;
            background-color: #ffffff00;
        }

        #send-btn {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: auto;
            display: block;
            background-color: var(--primary-color);
        }

        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        #send-btn:active {
            transform: translateY(0);
        }

        #send-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .loading-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loader {
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .markdown-content {
            max-width: 100%;
            overflow-x: auto;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 1em 0 0.5em;
            color: var(--primary-color);
        }

        .markdown-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0.5em 0;
            padding-left: 2em;
        }

        .markdown-content code {
            background-color: rgba(192, 192, 192, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }

        .markdown-content pre {
            background-color: #f6f8fa;
            padding: 1em;
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin: 1em 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }
    </style>
</head>

<body>
<div id="dialog-area">
    <div class="bot-message message-bubble">您好！我是电商智能客服，请问有什么需要我帮忙的？</div>
</div>
<div class="input-box">
    <textarea id="user-input" placeholder="需要我做什么？"></textarea>
    <button id="send-btn" onclick="sendMessage()">发送</button>
</div>

<script>
    const dialogArea = document.getElementById('dialog-area');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loadingBubble = createLoadingBubble();

    // 配置 marked 和 DOMPurify
    marked.setOptions({
        breaks: false,
        highlight: function (code) {
            return hljs ? hljs.highlightAuto(code).value : code;
        }
    });

    // 发送消息
    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        // 禁用发送按钮
        sendBtn.disabled = true;

        // 显示用户消息
        addMessage(message, true);

        // 清空输入框
        input.value = '';
        input.style.height = 'auto';

        // 显示加载动画
        dialogArea.appendChild(loadingBubble);
        window.scrollTo(0, document.body.scrollHeight);

        // 创建机器人消息气泡（用于流式追加内容）
        const botBubble = document.createElement('div');
        botBubble.classList.add('message-bubble', 'bot-message', 'new-message');
        const markdownContainer = document.createElement('div');
        markdownContainer.className = 'markdown-content';
        botBubble.appendChild(markdownContainer);

        // 用于累积 Markdown 原始文本
        let accumulatedText = '';

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            // 移除加载动画，换上机器人气泡
            loadingBubble.remove();
            dialogArea.appendChild(botBubble);

            // 流式读取
            while (true) {
                const {done, value} = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, {stream: true});
                accumulatedText += chunk;

                // 实时渲染 Markdown
                const dirty = marked.parse(accumulatedText);
                markdownContainer.innerHTML = DOMPurify.sanitize(dirty, {
                    ADD_TAGS: ["iframe"],
                    ADD_ATTR: ["allowfullscreen"]
                });

                // 自动滚动到底部
                window.scrollTo(0, document.body.scrollHeight);
            }

            // 移除动画类
            botBubble.addEventListener('animationend', function handler() {
                botBubble.classList.remove('new-message');
                botBubble.removeEventListener('animationend', handler);
            });

        } catch (error) {
            console.error('请求失败:', error);
            loadingBubble.remove();
            // 如果机器人气泡尚未添加，则添加错误信息
            if (!botBubble.parentNode) {
                dialogArea.appendChild(botBubble);
            }
            markdownContainer.innerHTML = DOMPurify.sanitize('<p style="color: red;">系统暂时无法响应，请稍后再试😥</p>');
        } finally {
            // 启用发送按钮
            sendBtn.disabled = false;
        }
    }

    // 创建加载气泡
    function createLoadingBubble() {
        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble', 'bot-message', 'new-message');
        const loadingContainer = document.createElement('div');
        loadingContainer.className = 'loading-container';
        const loader = document.createElement('div');
        loader.className = 'loader';
        loadingContainer.appendChild(loader);
        loadingContainer.appendChild(document.createTextNode('正在思索中...'));
        bubble.appendChild(loadingContainer);
        return bubble;
    }

    // 添加用户消息
    function addMessage(content, isUser) {
        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble', isUser ? 'user-message' : 'bot-message', 'new-message');
        bubble.textContent = content;
        bubble.addEventListener('animationend', function handler() {
            bubble.classList.remove('new-message');
            bubble.removeEventListener('animationend', handler);
        });
        dialogArea.appendChild(bubble);
        window.scrollTo(0, document.body.scrollHeight);
    }

    // 自动调整输入框高度
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });

    // 回车发送
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>

</html>
